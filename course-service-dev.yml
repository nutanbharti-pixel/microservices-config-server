server:
  port: 8081

spring:
  application:
    name: course-service
  datasource:
    url: jdbc:postgresql://localhost:5432/student_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
logging:
  level:
    org.springframework: INFO
    com.training: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
      show-details: always
